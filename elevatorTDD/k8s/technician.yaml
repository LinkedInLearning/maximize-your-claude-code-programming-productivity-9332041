apiVersion: apps/v1
kind: Deployment
metadata:
  name: technician
  labels:
    app: technician
spec:
  replicas: 1
  selector:
    matchLabels:
      app: technician
  template:
    metadata:
      labels:
        app: technician
    spec:
      containers:
        - name: technician
          image: elevatortdd:dev
          imagePullPolicy: IfNotPresent
          args:
            - uvicorn
            - app.technician_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8002"
            - --log-level
            - info
          ports:
            - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: technician
spec:
  type: ClusterIP
  selector:
    app: technician
  ports:
    - port: 8002
      targetPort: 8002
