apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevator
  labels:
    app: elevator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elevator
  template:
    metadata:
      labels:
        app: elevator
    spec:
      containers:
        - name: elevator
          image: elevatortdd:dev
          imagePullPolicy: IfNotPresent
          args:
            - uvicorn
            - app.elevator_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8001"
            - --log-level
            - info
          env:
            - name: TECHNICIAN_URL
              value: http://technician:8002
            - name: ELEVATOR_IDS
              value: e1,e2
            - name: TOP_SPEED
              value: "1"
            - name: FIX_SECONDS
              value: "2.0"
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: elevator
spec:
  type: NodePort
  selector:
    app: elevator
  ports:
    - port: 8001
      targetPort: 8001
