<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elevator Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0a0b0f;
      --surface: #13151b;
      --surface-2: #1a1d25;
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.12);
      --highlight: rgba(255, 255, 255, 0.04);
      --text: #e6e8ee;
      --text-dim: #8a92a3;
      --text-faint: #5a6172;
      --accent: #5eead4;
      --accent-dim: rgba(94, 234, 212, 0.18);
      --accent-glow: rgba(94, 234, 212, 0.35);
      --healthy: #34d399;
      --moving: #60a5fa;
      --broken: #fb7185;
      --amber: #fbbf24;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', system-ui, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(94, 234, 212, 0.08), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(96, 165, 250, 0.05), transparent 60%);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.9'/></svg>");
      z-index: 0;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      background: rgba(10, 11, 15, 0.65);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 28px;
      display: flex;
      align-items: baseline;
      gap: 18px;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .brand-mark {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: -0.02em;
      font-variation-settings: "opsz" 144;
    }
    .brand-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
    .live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent-glow);
      animation: live-pulse 2s ease-out infinite;
    }
    @keyframes live-pulse {
      0% { box-shadow: 0 0 0 0 var(--accent-glow); }
      70% { box-shadow: 0 0 0 8px rgba(94, 234, 212, 0); }
      100% { box-shadow: 0 0 0 0 rgba(94, 234, 212, 0); }
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }

    .intro {
      margin: 8px 0 28px;
      max-width: 640px;
    }
    .intro h1 {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144;
      font-weight: 700;
      font-size: clamp(36px, 5vw, 56px);
      letter-spacing: -0.025em;
      line-height: 1.02;
      margin: 0 0 12px;
    }
    .intro h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 500;
    }
    .intro p {
      margin: 0;
      color: var(--text-dim);
      font-size: 15px;
      line-height: 1.55;
    }

    .fleet {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .fleet-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .fleet-card::before {
      content: '';
      position: absolute; inset: 0;
      border-top: 1px solid var(--highlight);
      border-radius: inherit;
      pointer-events: none;
    }
    .fleet-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fleet-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-faint);
      text-transform: uppercase;
    }
    .fleet-floor {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .fleet-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }
    .fleet-strip {
      position: relative;
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .fleet-strip-dot {
      position: absolute;
      top: 0; bottom: 0;
      width: 12%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transition: left 200ms linear;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px 3px 8px;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .pill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }
    .pill.healthy { color: var(--healthy); border-color: rgba(52, 211, 153, 0.25); }
    .pill.moving  { color: var(--moving);  border-color: rgba(96, 165, 250, 0.25); }
    .pill.broken  { color: var(--broken);  border-color: rgba(251, 113, 133, 0.35); animation: pulse-red 1.4s ease-in-out infinite; }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251, 113, 133, 0); }
      50%      { box-shadow: 0 0 0 6px rgba(251, 113, 133, 0.12); }
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 20px;
    }

    .panel {
      position: relative;
      background: linear-gradient(180deg, var(--surface) 0%, #101218 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 22px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      animation: card-in 480ms cubic-bezier(.2,.7,.2,1) forwards;
    }
    .panel::before {
      content: '';
      position: absolute; inset: 0;
      border-top: 1px solid var(--highlight);
      border-radius: inherit;
      pointer-events: none;
    }
    @keyframes card-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .shaft {
      position: relative;
      height: 340px;
      width: 56px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.25));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .shaft-rail {
      position: absolute;
      left: 50%;
      top: 8px; bottom: 8px;
      width: 2px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(
        180deg,
        rgba(255,255,255,0.05) 0 2px,
        transparent 2px 12px
      );
    }
    .shaft-marks {
      position: absolute;
      inset: 8px 6px;
      display: flex;
      flex-direction: column-reverse;
      justify-content: space-between;
    }
    .shaft-mark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-faint);
      text-align: right;
      line-height: 1;
      letter-spacing: 0.05em;
    }
    .cab {
      position: absolute;
      left: 8px;
      right: 8px;
      height: 22px;
      border-radius: 6px;
      background: linear-gradient(180deg, var(--accent), #2dd4bf);
      box-shadow:
        0 0 0 1px rgba(94, 234, 212, 0.4),
        0 0 18px var(--accent-glow),
        inset 0 1px 0 rgba(255,255,255,0.4);
      transition: top 200ms linear, background 400ms ease, box-shadow 400ms ease;
      transform: translateY(-50%);
    }
    .cab.moving::after {
      content: '';
      position: absolute;
      left: 50%; top: -8px;
      transform: translateX(-50%);
      width: 60%; height: 4px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.25;
      filter: blur(4px);
    }
    .cab.broken {
      background: linear-gradient(180deg, var(--broken), #e11d48);
      box-shadow:
        0 0 0 1px rgba(251, 113, 133, 0.5),
        0 0 22px rgba(251, 113, 133, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.3);
      animation: cab-broken 1.2s ease-in-out infinite;
    }
    @keyframes cab-broken {
      0%, 100% { transform: translateY(-50%) translateX(0); }
      25%      { transform: translateY(-50%) translateX(-1px); }
      75%      { transform: translateY(-50%) translateX(1px); }
    }

    .panel-content {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .panel-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .panel-title b {
      color: var(--text);
      font-weight: 500;
    }

    .floor-block {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin: 4px 0 14px;
      position: relative;
    }
    .floor-display {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144;
      font-weight: 700;
      font-size: 88px;
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--text);
      position: relative;
    }
    .floor-display.swap {
      animation: swap 320ms cubic-bezier(.2,.7,.2,1);
    }
    @keyframes swap {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .floor-display .ring {
      position: absolute;
      inset: -8px -12px;
      border: 2px solid var(--accent);
      border-radius: 18px;
      opacity: 0;
      pointer-events: none;
    }
    .floor-display.arrived .ring {
      animation: arrived 600ms ease-out;
    }
    @keyframes arrived {
      0%   { opacity: 0.6; transform: scale(0.85); }
      100% { opacity: 0;   transform: scale(1.15); }
    }
    .floor-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 8px;
    }
    .floor-meta .eta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }

    .row-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin: 12px 0 8px;
    }

    .user-field {
      position: relative;
      margin-bottom: 4px;
    }
    .user-field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-strong);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      padding: 8px 2px;
      outline: none;
      transition: border-color 180ms ease;
    }
    .user-field input::placeholder { color: var(--text-faint); }
    .user-field input:focus { border-color: var(--accent); }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 6px;
    }
    .floor-btn {
      position: relative;
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 120ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
    }
    .floor-btn:hover {
      border-color: var(--accent);
      background: rgba(94, 234, 212, 0.06);
      transform: translateY(-1px);
    }
    .floor-btn:active { transform: scale(0.96); }
    .floor-btn.active {
      background: var(--accent);
      color: #0a0b0f;
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .floor-btn.pending::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 8px;
      border: 1px dashed var(--accent);
      animation: pending 1.2s linear infinite;
    }
    @keyframes pending {
      0%   { opacity: 0.2; }
      50%  { opacity: 0.7; }
      100% { opacity: 0.2; }
    }

    .maint-btn {
      margin-top: 10px;
      width: 100%;
      height: 42px;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text-dim);
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 180ms ease;
    }
    .maint-btn:hover {
      color: var(--amber);
      border-color: rgba(251, 191, 36, 0.4);
      background: rgba(251, 191, 36, 0.05);
    }
    .maint-btn svg { width: 14px; height: 14px; }

    .log {
      margin-top: 16px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      line-height: 1.55;
      color: var(--text-dim);
      max-height: 150px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
    }
    .log::-webkit-scrollbar { width: 6px; }
    .log::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    .log-entry {
      padding: 2px 0;
      animation: log-in 220ms ease-out;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-entry .ts { color: var(--text-faint); margin-right: 8px; }
    .log-entry.err { color: var(--broken); }
    .log-entry.warn { color: var(--amber); }
    .log-entry.ok { color: var(--healthy); }
    @keyframes log-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .panel { grid-template-columns: 48px 1fr; padding: 18px; }
      .shaft { width: 48px; height: 300px; }
      .floor-display { font-size: 72px; }
      .header-inner { padding: 14px 18px; }
      main { padding: 24px 18px 60px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">Otis<em style="font-style:italic;color:var(--accent);font-weight:500">.live</em></div>
        <div class="brand-sub">Fleet Control · v2</div>
      </div>
      <div class="live"><span class="live-dot"></span><span id="live-summary">connecting…</span></div>
    </div>
  </header>

  <main>
    <section class="intro">
      <h1>Move people, <em>gracefully</em>.</h1>
      <p>One panel per elevator, polled in real time. Roughly 1% of calls will trigger a breakdown — dispatch a technician with <span style="color:var(--amber)">Routine maintenance</span> at any time.</p>
    </section>

    <section class="fleet" id="fleet" aria-label="Fleet overview"></section>

    <section class="panels" id="panels"></section>
  </main>

  <script>
    const FLOOR_MIN = -1;
    const FLOOR_MAX = 8;
    const FLOOR_RANGE = FLOOR_MAX - FLOOR_MIN;

    const panelsEl = document.getElementById("panels");
    const fleetEl = document.getElementById("fleet");
    const liveSummary = document.getElementById("live-summary");
    const panels = new Map();
    const fleetCards = new Map();
    const lastMotion = new Map();
    const lastFloorInt = new Map();
    function shaftPositionPct(floor) {
      const clamped = Math.max(FLOOR_MIN, Math.min(FLOOR_MAX, floor));
      const t = (clamped - FLOOR_MIN) / FLOOR_RANGE;
      return (1 - t) * 100;
    }

    function buildPanel(elevatorId, panelIndex) {
      const panel = document.createElement("div");
      panel.className = "panel";
      panel.style.animationDelay = `${panelIndex * 60}ms`;

      const shaftMarks = [];
      for (let f = FLOOR_MAX; f >= FLOOR_MIN; f--) {
        shaftMarks.push(`<div class="shaft-mark">${f}</div>`);
      }

      panel.innerHTML = `
        <div class="shaft">
          <div class="shaft-rail"></div>
          <div class="shaft-marks">${shaftMarks.reverse().join("")}</div>
          <div class="cab" style="top: 100%"></div>
        </div>
        <div class="panel-content">
          <div class="panel-head">
            <div class="panel-title">Elevator <b class="eid"></b></div>
            <span class="pill healthy"><span class="pill-dot"></span><span class="state-label">loading</span></span>
          </div>
          <div class="floor-block">
            <div class="floor-display">–<span class="ring"></span></div>
            <div class="floor-meta">
              <div class="motion-label" style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint)">idle</div>
              <div class="eta"></div>
            </div>
          </div>
          <div class="row-label">Passenger (optional)</div>
          <div class="user-field"><input type="text" class="user" placeholder="e.g. alice" autocomplete="off" /></div>
          <div class="row-label">Call to floor</div>
          <div class="buttons"></div>
          <button class="maint-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 0 0 5.4-5.4l-2.5 2.5-2.5-2.5 2.5-2.5z"/></svg>
            Routine maintenance
          </button>
          <div class="log"></div>
        </div>
      `;

      panel.querySelector(".eid").textContent = elevatorId;
      const buttons = panel.querySelector(".buttons");
      const btnRefs = new Map();
      for (let f = FLOOR_MIN; f <= FLOOR_MAX; f++) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "floor-btn";
        b.textContent = f;
        b.onclick = () => callTo(elevatorId, f);
        buttons.appendChild(b);
        btnRefs.set(f, b);
      }
      panel.querySelector(".maint-btn").onclick = () => maintenance(elevatorId);

      panelsEl.appendChild(panel);

      panels.set(elevatorId, {
        panel,
        floorEl: panel.querySelector(".floor-display"),
        motionEl: panel.querySelector(".motion-label"),
        etaEl: panel.querySelector(".eta"),
        pillEl: panel.querySelector(".pill"),
        pillLabel: panel.querySelector(".state-label"),
        userInput: panel.querySelector(".user"),
        logEl: panel.querySelector(".log"),
        cabEl: panel.querySelector(".cab"),
        btnRefs,
      });
    }

    function buildFleetCard(elevatorId) {
      const card = document.createElement("div");
      card.className = "fleet-card";
      card.innerHTML = `
        <div class="fleet-row">
          <span class="fleet-id">${elevatorId}</span>
          <span class="pill healthy"><span class="pill-dot"></span><span class="lbl">—</span></span>
        </div>
        <div class="fleet-row">
          <div class="fleet-floor">–</div>
          <div class="fleet-meta">ETA <span class="eta">—</span></div>
        </div>
        <div class="fleet-strip"><div class="fleet-strip-dot" style="left:0%"></div></div>
      `;
      fleetEl.appendChild(card);
      fleetCards.set(elevatorId, {
        card,
        pill: card.querySelector(".pill"),
        pillLbl: card.querySelector(".lbl"),
        floor: card.querySelector(".fleet-floor"),
        eta: card.querySelector(".eta"),
        dot: card.querySelector(".fleet-strip-dot"),
      });
    }

    function log(elevatorId, msg, level) {
      const p = panels.get(elevatorId);
      if (!p) return;
      const row = document.createElement("div");
      row.className = "log-entry" + (level ? ` ${level}` : "");
      const ts = new Date().toLocaleTimeString([], { hour12: false });
      row.innerHTML = `<span class="ts">${ts}</span>${msg}`;
      p.logEl.prepend(row);
      while (p.logEl.children.length > 40) p.logEl.removeChild(p.logEl.lastChild);
    }

    async function maintenance(elevatorId) {
      log(elevatorId, "→ dispatching technician…");
      try {
        const res = await fetch(`/elevators/${elevatorId}/maintenance`, { method: "POST" });
        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch { data = { detail: raw }; }
        if (res.status === 200) {
          log(elevatorId, `tech <b style="color:var(--text)">${data.technician_id}</b> · ETA ${data.eta_seconds.toFixed(2)}s`, "ok");
        } else {
          log(elevatorId, `maintenance ${res.status} · ${data.detail || JSON.stringify(data)}`, "warn");
        }
      } catch (err) {
        log(elevatorId, `maintenance error · ${err}`, "err");
      }
      refresh();
    }

    async function callTo(elevatorId, floor) {
      const p = panels.get(elevatorId);
      const body = { floor };
      const user = p.userInput.value.trim();
      if (user) body.user = user;
      const btn = p.btnRefs.get(floor);
      if (btn) btn.classList.add("pending");
      log(elevatorId, `call → floor ${floor}${user ? ` · by ${user}` : ""}`);
      try {
        const res = await fetch(`/elevators/${elevatorId}/call_to`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body),
        });
        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch { data = { error: raw }; }
        if (res.status === 200) {
          log(elevatorId, `trip ${data.from_floor} → ${data.to_floor} · ETA ${data.eta_seconds.toFixed(2)}s`, "ok");
        } else if (res.status === 503) {
          log(elevatorId, `blocked · tech ${data.technician_id} ETA ${data.eta_seconds.toFixed(2)}s`, "warn");
        } else {
          log(elevatorId, `call ${res.status} · ${data.error || JSON.stringify(data)}`, "err");
        }
      } catch (err) {
        log(elevatorId, `call error · ${err}`, "err");
      } finally {
        if (btn) setTimeout(() => btn.classList.remove("pending"), 600);
      }
      refresh();
    }

    function render(status) {
      const p = panels.get(status.elevator_id);
      if (!p) return;

      const floorNum = Number(status.current_floor);
      const floorInt = Math.round(floorNum);
      const prevInt = lastFloorInt.get(status.elevator_id);
      const displayValue = floorInt;
      if (p.floorEl.firstChild && p.floorEl.firstChild.nodeType === 3) {
        if (p.floorEl.firstChild.nodeValue !== String(displayValue)) {
          p.floorEl.firstChild.nodeValue = String(displayValue);
          p.floorEl.classList.remove("swap");
          void p.floorEl.offsetWidth;
          p.floorEl.classList.add("swap");
        }
      } else {
        p.floorEl.insertBefore(document.createTextNode(String(displayValue)), p.floorEl.firstChild);
      }

      p.cabEl.style.top = `${shaftPositionPct(floorNum)}%`;
      p.cabEl.classList.toggle("moving", !!status.in_motion);
      p.cabEl.classList.toggle("broken", !!status.is_broken);

      p.pillEl.classList.remove("healthy", "moving", "broken");
      if (status.is_broken) {
        p.pillEl.classList.add("broken");
        p.pillLabel.textContent = "broken";
        p.motionEl.textContent = `tech ${status.technician_id || ""} arriving`;
        p.etaEl.textContent = status.eta_seconds != null ? `ETA ${status.eta_seconds.toFixed(1)}s` : "";
      } else if (status.in_motion) {
        p.pillEl.classList.add("moving");
        p.pillLabel.textContent = "in motion";
        p.motionEl.textContent = "ascending / descending";
        p.etaEl.textContent = "";
      } else {
        p.pillEl.classList.add("healthy");
        p.pillLabel.textContent = "idle";
        p.motionEl.textContent = "idle";
        p.etaEl.textContent = "";
      }

      const prevMotion = lastMotion.get(status.elevator_id);
      if (prevMotion === true && status.in_motion === false) {
        log(status.elevator_id, `arrived at floor ${floorInt}`, "ok");
        p.floorEl.classList.remove("arrived");
        void p.floorEl.offsetWidth;
        p.floorEl.classList.add("arrived");
      }
      lastMotion.set(status.elevator_id, status.in_motion);
      lastFloorInt.set(status.elevator_id, floorInt);

      for (const [f, btn] of p.btnRefs) {
        btn.classList.toggle("active", !status.in_motion && !status.is_broken && f === floorInt);
        if (btn.classList.contains("pending") && !status.in_motion) {
          btn.classList.remove("pending");
        }
      }
    }

    function renderFleet(list) {
      let inMotion = 0;
      let broken = 0;
      for (const s of list) {
        if (!fleetCards.has(s.elevator_id)) buildFleetCard(s.elevator_id);
        const fc = fleetCards.get(s.elevator_id);
        const floorNum = Number(s.current_floor);
        fc.floor.textContent = floorNum.toFixed(1);
        fc.eta.textContent = s.eta_seconds ? `${s.eta_seconds.toFixed(1)}s` : "—";
        fc.pill.classList.remove("healthy", "moving", "broken");
        if (s.is_broken) { fc.pill.classList.add("broken"); fc.pillLbl.textContent = "broken"; broken++; }
        else if (s.in_motion) { fc.pill.classList.add("moving"); fc.pillLbl.textContent = "moving"; inMotion++; }
        else { fc.pill.classList.add("healthy"); fc.pillLbl.textContent = "idle"; }
        const t = (Math.max(FLOOR_MIN, Math.min(FLOOR_MAX, floorNum)) - FLOOR_MIN) / FLOOR_RANGE;
        fc.dot.style.left = `${Math.max(0, Math.min(88, t * 100 - 6))}%`;
      }
      const parts = [`${list.length} elevator${list.length === 1 ? "" : "s"}`];
      if (inMotion) parts.push(`${inMotion} in motion`);
      if (broken) parts.push(`${broken} broken`);
      liveSummary.textContent = parts.join(" · ");
    }

    async function refresh() {
      try {
        const res = await fetch("/elevators", { cache: "no-store" });
        const list = await res.json();
        list.forEach((s, i) => {
          if (!panels.has(s.elevator_id)) buildPanel(s.elevator_id, i);
          render(s);
        });
        renderFleet(list);
      } catch (err) {
        // ignore transient errors during polling
      }
    }

    refresh();
    setInterval(refresh, 100);
  </script>
</body>
</html>
