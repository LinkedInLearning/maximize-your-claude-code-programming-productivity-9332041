<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scroll Typing Trainer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top">
      <h1>Scroll Typer</h1>
      <div class="stats">
        <div><span class="label">WPM</span><span id="wpm">0</span></div>
        <div><span class="label">Accuracy</span><span id="acc">100%</span></div>
        <div><span class="label">Passage</span><span id="passage-num">1</span></div>
      </div>
    </header>

    <main>
      <div id="viewport" class="viewport" tabindex="0" aria-label="Typing area">
        <div id="caret-marker" class="caret-marker"></div>
        <div id="strip" class="strip"></div>
        <div id="blur-hint" class="blur-hint">Click here and start typing</div>
      </div>

      <div class="controls">
        <button id="restart">Restart</button>
        <button id="next">Next passage</button>
        <button id="export">Export results</button>
      </div>
    </main>

    <div id="results-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2>Passage complete</h2>
        <div class="result-row"><span>WPM</span><strong id="r-wpm">0</strong></div>
        <div class="result-row"><span>Accuracy</span><strong id="r-acc">0%</strong></div>
        <div class="result-row"><span>Time</span><strong id="r-time">0s</strong></div>
        <div class="modal-actions">
          <button id="r-next">Next passage</button>
          <button id="r-close">Close</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
